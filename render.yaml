services:
  - type: web
    name: hypertension-detection
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hypertension-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: hypertension-db
    databaseName: hypertension_db
    plan: free
