
services:
  - type: web
    name: hypertension-prediction
    runtime: python
    plan: free   
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers=2 --timeout=120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hypertension-db
          property: connectionString
      - key: FLASK_DEBUG
        value: "false"
    autoDeploy: true
    
databases:
  - name: hypertension-db
    databaseName: hypertension_db
    plan: free

